<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Таблетки">
<title>Мои таблетки</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#F2F2F7;min-height:100vh;max-width:430px;margin:0 auto}
:root{
  --green:#1D9E75;--green-bg:#E1F5EE;--green-dark:#0F6E56;
  --amber:#BA7517;--amber-bg:#FAEEDA;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-dark:#791F1F;
  --border:rgba(0,0,0,0.09);--card:#fff;--bg:#F2F2F7;
  --text:#000;--text2:#6B6B6B;--text3:#AEAEB2;--surface:#F2F2F7
}
@media(prefers-color-scheme:dark){
  :root{--card:#1C1C1E;--bg:#000;--surface:#2C2C2E;--text:#fff;--text2:#AEAEB2;--text3:#636366;--border:rgba(255,255,255,0.11)}
  body{background:#000}
  .header,.nav{background:#1C1C1E}
  .ring-track{stroke:#3A3A3C}
  .ring-num{fill:#fff}
  .ring-sub-txt{fill:#AEAEB2}
}
.app{min-height:100vh;background:var(--bg)}

/* ── Header ── */
.header{background:var(--card);border-bottom:0.5px solid var(--border);padding:52px 20px 16px;position:sticky;top:0;z-index:10}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.greeting{font-size:13px;color:var(--text2);margin-bottom:2px}
.app-title{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.add-btn{width:36px;height:36px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;flex-shrink:0;margin-top:4px}

/* ── Ring progress ── */
.ring-row{display:flex;align-items:center;gap:16px}
.ring-wrap{flex-shrink:0}
.ring-track{fill:none;stroke:#E5E5EA;stroke-width:7}
.ring-fill{fill:none;stroke:var(--green);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);transform-origin:center;transform:rotate(-90deg)}
.ring-num{font-size:15px;font-weight:700;fill:#000;text-anchor:middle}
.ring-sub-txt{font-size:9px;fill:#8E8E93;text-anchor:middle}
.ring-info{flex:1}
.ring-pct{font-size:30px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1}
.ring-desc{font-size:13px;color:var(--text2);margin-top:3px}
.streak-pill{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);border-radius:20px;padding:5px 11px;margin-top:9px;font-size:12px;font-weight:600;color:var(--green-dark)}

/* ── Screens ── */
.screen{padding:14px 14px 0}
.sec-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;padding:0 2px}

/* ── Pill group (color stripe) ── */
.pill-group{background:var(--card);border-radius:16px;margin-bottom:9px;border:0.5px solid var(--border);overflow:hidden;display:flex}
.pill-stripe{width:5px;flex-shrink:0}
.pill-body{flex:1;min-width:0}
.pill-head{display:flex;align-items:center;gap:10px;padding:12px 14px 0 12px;cursor:pointer}
.pill-emoji-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.pill-meta{flex:1;min-width:0}
.pill-name{font-size:15px;font-weight:600;color:var(--text)}
.pill-freq{font-size:12px;color:var(--text2);margin-top:1px}
.dl-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.dl-ok{background:var(--green-bg);color:var(--green-dark)}
.dl-warn{background:var(--amber-bg);color:var(--amber)}
.dl-end{background:var(--red-bg);color:var(--red-dark)}
.dl-none{background:var(--surface);color:var(--text2)}

/* ── Dose rows ── */
.dose-row{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 12px;border-top:0.5px solid var(--border);margin-top:10px}
.dose-row.done{opacity:0.42}
.dose-time{font-size:13px;color:var(--text2);min-width:44px}
.dose-lbl{font-size:14px;color:var(--text);flex:1}

/* ── Check button ── */
.check-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:transform 0.15s,background 0.2s,border-color 0.2s}
.check-btn:active{transform:scale(0.88)}
.check-btn.checked{border-color:var(--green);background:var(--green)}
.check-btn svg{width:15px;height:15px;stroke:#fff;stroke-width:2.8;fill:none;opacity:0;transition:opacity 0.15s}
.check-btn.checked svg{opacity:1}

/* ── Toast notification ── */
.toast{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-120px);max-width:390px;width:calc(100% - 32px);background:var(--card);border-radius:16px;border:0.5px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:12px;z-index:200;transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.toast.show{transform:translateX(-50%) translateY(60px)}
.toast-icon{width:38px;height:38px;border-radius:10px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.toast-body{flex:1;min-width:0}
.toast-title{font-size:14px;font-weight:600;color:var(--text)}
.toast-sub{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast-streak{font-size:18px;font-weight:700;color:var(--green);flex-shrink:0}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-txt{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:13px}

/* ── Calendar ── */
.cal-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:0.5px solid var(--border)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-btn{width:34px;height:34px;border:0.5px solid var(--border);border-radius:10px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.cal-nav-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.cal-month{font-size:16px;font-weight:600;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:14px;cursor:pointer;color:var(--text);position:relative}
.cal-day.other{color:var(--text3)}
.cal-day.today{background:var(--green-bg);color:var(--green-dark);font-weight:600}
.cal-day.sel{background:var(--green);color:#fff;font-weight:600}
.cal-day.has-pills::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);position:absolute;bottom:3px}
.cal-day.sel.has-pills::after{background:rgba(255,255,255,0.8)}
.detail-card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:12px;border:0.5px solid var(--border)}
.detail-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;text-transform:capitalize}
.detail-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.detail-item:last-child{border-bottom:none}
.det-emoji{font-size:17px;width:26px;text-align:center}
.det-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.det-time{font-size:12px;color:var(--text2)}
.det-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Stats ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
.stat-box{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:var(--green)}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:3px}
.info-card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:12px}
.info-card-h{font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px}
.course-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.course-item:last-child{border-bottom:none}
.c-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-size:14px;font-weight:500;color:var(--text)}
.c-sub{font-size:12px;color:var(--text2);margin-top:1px}
.c-prog-wrap{height:4px;border-radius:2px;background:var(--surface);margin-top:5px}
.c-prog-fill{height:4px;border-radius:2px;background:var(--green)}
.c-days{font-size:12px;font-weight:600;white-space:nowrap;text-align:right;min-width:76px}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-name{font-size:13px;font-weight:500;color:var(--text)}
.hist-date{font-size:12px;color:var(--text2)}
.hb{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.hb-done{background:var(--green-bg);color:var(--green-dark)}
.hb-skip{background:var(--surface);color:var(--text2)}

/* ── Nav ── */
.nav{display:flex;background:var(--card);border-top:0.5px solid var(--border);padding:10px 0 28px;position:sticky;bottom:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;font-size:11px;color:var(--text2);font-family:inherit;padding:0}
.nav-btn.active{color:var(--green)}
.nav-btn svg{width:24px;height:24px;stroke:currentColor;stroke-width:1.8;fill:none}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:20px 20px 42px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:16px}
.flbl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;margin-top:14px}
.finput{width:100%;padding:12px 14px;border:0.5px solid var(--border);border-radius:12px;font-size:16px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none}
.finput:focus{border-color:var(--green)}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:6px}
.ebtn{width:100%;aspect-ratio:1;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ebtn.sel{border-color:var(--green);background:var(--green-bg)}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:6px}
.dbtn{padding:9px 2px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;font-family:inherit}
.dbtn.sel{border-color:var(--green);background:var(--green-bg);color:var(--green-dark)}
.freq-preset-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.fpreset{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit}
.fpreset.sel{border-color:var(--green);background:var(--green-bg);color:var(--green-dark)}
.times-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.time-row{display:flex;align-items:center;gap:8px}
.time-lbl{font-size:13px;color:var(--text2);min-width:60px}
.rm-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border);background:transparent;color:var(--text2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.add-time-btn{margin-top:8px;padding:10px;border-radius:12px;border:1.5px dashed var(--border);background:transparent;color:var(--green);font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.btn-row{display:flex;gap:10px;margin-top:20px}
.bcn{flex:1;padding:14px;border:0.5px solid var(--border);border-radius:14px;background:transparent;color:var(--text2);font-size:16px;cursor:pointer;font-family:inherit;font-weight:500}
.bsv{flex:2;padding:14px;border:none;border-radius:14px;background:var(--green);color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.bdel{width:100%;padding:14px;border:0.5px solid var(--red);border-radius:14px;background:transparent;color:var(--red);font-size:16px;cursor:pointer;margin-top:10px;font-family:inherit;font-weight:500}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toast-icon">✅</div>
  <div class="toast-body">
    <div class="toast-title" id="toast-title">Отлично!</div>
    <div class="toast-sub" id="toast-sub"></div>
  </div>
  <div class="toast-streak" id="toast-streak"></div>
</div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="greeting" id="greeting">Добрый день</div>
        <div class="app-title">Таблетки</div>
      </div>
      <button class="add-btn" onclick="openAdd()" aria-label="Добавить">+</button>
    </div>
    <div class="ring-row">
      <div class="ring-wrap">
        <svg width="82" height="82" viewBox="0 0 82 82">
          <circle class="ring-track" cx="41" cy="41" r="33"/>
          <circle class="ring-fill" id="ring-fill" cx="41" cy="41" r="33"
            stroke-dasharray="207.3" stroke-dashoffset="207.3"/>
          <text class="ring-num" id="ring-num" x="41" y="38">0/0</text>
          <text class="ring-sub-txt" x="41" y="51">принято</text>
        </svg>
      </div>
      <div class="ring-info">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-desc" id="ring-desc">выполнено на сегодня</div>
        <div class="streak-pill" id="streak-pill" style="display:none">
          <span>🔥</span><span id="streak-num">0</span><span>дней подряд</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Home -->
  <div id="home-screen" class="screen">
    <div class="sec-title" style="margin-top:8px">Сегодня</div>
    <div id="pills-list"></div>
  </div>

  <!-- Calendar -->
  <div id="cal-screen" class="screen" style="display:none">
    <div class="cal-card" style="margin-top:8px">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div id="cal-detail"></div>
  </div>

  <!-- Stats -->
  <div id="stats-screen" class="screen" style="display:none">
    <div class="stat-grid" style="margin-top:8px">
      <div class="stat-box"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">Таблеток всего</div></div>
      <div class="stat-box"><div class="stat-num" id="st-taken">0</div><div class="stat-lbl">Приёмов сегодня</div></div>
    </div>
    <div class="info-card">
      <div class="info-card-h">Курсы лечения</div>
      <div id="courses-list"></div>
    </div>
    <div class="info-card" style="margin-bottom:20px">
      <div class="info-card-h">История</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Главная
    </button>
    <button class="nav-btn" id="nav-cal" onclick="showScreen('cal')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Календарь
    </button>
    <button class="nav-btn" id="nav-stats" onclick="showScreen('stats')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Статистика
    </button>
  </div>
</div>

<!-- Modal -->
<div id="modal-root" style="display:none">
  <div class="overlay" onclick="overlayClick(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-title">Добавить таблетку</div>
      <label class="flbl">Название</label>
      <input class="finput" id="f-name" placeholder="Например: Витамин D"/>
      <label class="flbl">Дозировка</label>
      <input class="finput" id="f-dose" placeholder="Например: 1 таблетка / 1000 МЕ"/>
      <label class="flbl">Начало курса</label>
      <input class="finput" type="date" id="f-start"/>
      <label class="flbl">Конец курса (необязательно)</label>
      <input class="finput" type="date" id="f-end"/>
      <label class="flbl">Иконка</label>
      <div class="emoji-grid">
        <button class="ebtn sel" data-e="💊" onclick="selEmoji(this)">💊</button>
        <button class="ebtn" data-e="💉" onclick="selEmoji(this)">💉</button>
        <button class="ebtn" data-e="🌿" onclick="selEmoji(this)">🌿</button>
        <button class="ebtn" data-e="🫀" onclick="selEmoji(this)">🫀</button>
        <button class="ebtn" data-e="🧴" onclick="selEmoji(this)">🧴</button>
        <button class="ebtn" data-e="🌙" onclick="selEmoji(this)">🌙</button>
        <button class="ebtn" data-e="☀️" onclick="selEmoji(this)">☀️</button>
        <button class="ebtn" data-e="🍋" onclick="selEmoji(this)">🍋</button>
        <button class="ebtn" data-e="🧠" onclick="selEmoji(this)">🧠</button>
        <button class="ebtn" data-e="❤️" onclick="selEmoji(this)">❤️</button>
        <button class="ebtn" data-e="🦴" onclick="selEmoji(this)">🦴</button>
        <button class="ebtn" data-e="👁️" onclick="selEmoji(this)">👁️</button>
      </div>
      <label class="flbl">Частота приёма</label>
      <div class="freq-preset-row" id="freq-presets">
        <button class="fpreset sel" data-n="1" onclick="applyPreset(this)">1 раз</button>
        <button class="fpreset" data-n="2" onclick="applyPreset(this)">2 раза</button>
        <button class="fpreset" data-n="3" onclick="applyPreset(this)">3 раза</button>
        <button class="fpreset" data-n="4" onclick="applyPreset(this)">4 раза</button>
        <button class="fpreset" data-n="0" onclick="applyPreset(this)">Своё</button>
      </div>
      <div class="times-list" id="times-list"></div>
      <button class="add-time-btn" id="add-time-btn" onclick="addTimeRow()" style="display:none">+ Добавить время</button>
      <label class="flbl">Дни приёма</label>
      <div class="days-grid">
        <button class="dbtn sel" data-d="0" onclick="togDay(this)">Пн</button>
        <button class="dbtn sel" data-d="1" onclick="togDay(this)">Вт</button>
        <button class="dbtn sel" data-d="2" onclick="togDay(this)">Ср</button>
        <button class="dbtn sel" data-d="3" onclick="togDay(this)">Чт</button>
        <button class="dbtn sel" data-d="4" onclick="togDay(this)">Пт</button>
        <button class="dbtn sel" data-d="5" onclick="togDay(this)">Сб</button>
        <button class="dbtn sel" data-d="6" onclick="togDay(this)">Вс</button>
      </div>
      <div class="btn-row">
        <button class="bcn" onclick="closeModal()">Отмена</button>
        <button class="bsv" onclick="savePill()">Сохранить</button>
      </div>
      <button class="bdel" id="delete-btn" style="display:none" onclick="deletePill()">Удалить таблетку</button>
    </div>
  </div>
</div>

<script>
/* ── Palette for stripes ── */
const PALETTE=[
  {stripe:'#1D9E75',bg:'#E1F5EE'},
  {stripe:'#D85A30',bg:'#FAECE7'},
  {stripe:'#534AB7',bg:'#EEEDFE'},
  {stripe:'#D4537E',bg:'#FBEAF0'},
  {stripe:'#BA7517',bg:'#FAEEDA'},
  {stripe:'#378ADD',bg:'#E6F1FB'},
  {stripe:'#639922',bg:'#EAF3DE'},
  {stripe:'#888780',bg:'#F1EFE8'},
];
const DEFAULT_TIMES={1:['08:00'],2:['08:00','20:00'],3:['08:00','14:00','20:00'],4:['08:00','12:00','16:00','20:00']};
const FREQ_LABELS={1:'1 раз в день',2:'2 раза в день',3:'3 раза в день',4:'4 раза в день'};
const PRAISE_ALL=['🎉 Все приёмы выполнены!','⭐ Идеальный день!','🏆 100% сегодня — так держать!'];
const PRAISE_ONE=['Принято!','Молодец!','Отлично!','Так держать!','💪 Хорошая работа!'];

let pills=JSON.parse(localStorage.getItem('pills_v3')||'[]');
let taken=JSON.parse(localStorage.getItem('taken_v3')||'{}');
let history=JSON.parse(localStorage.getItem('hist_v3')||'[]');
let streak=parseInt(localStorage.getItem('streak_v3')||'0');
let lastStreakDate=localStorage.getItem('streakDate_v3')||'';
let editId=null,selE='💊';
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth(),selCalDay=null;
let toastTimer=null;

function pad(n){return String(n).padStart(2,'0')}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function parseDateLocal(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function dowIndex(d){const x=d.getDay();return x===0?6:x-1}
function takenKey(ds,pid,ti){return ds+'|'+pid+'|'+ti}

function daysLeft(p){
  if(!p.endDate)return null;
  const t=new Date();t.setHours(0,0,0,0);
  const e=parseDateLocal(p.endDate);e.setHours(0,0,0,0);
  return Math.ceil((e-t)/864e5);
}

function pillActiveOnDate(p,ds){
  const d=parseDateLocal(ds);if(!d)return false;
  d.setHours(0,0,0,0);
  if(p.startDate){const s=parseDateLocal(p.startDate);s.setHours(0,0,0,0);if(d<s)return false}
  if(p.endDate){const e=parseDateLocal(p.endDate);e.setHours(0,0,0,0);if(d>e)return false}
  return p.days.includes(dowIndex(parseDateLocal(ds)));
}

function getGreeting(){
  const h=new Date().getHours();
  if(h<12)return'Доброе утро';if(h<18)return'Добрый день';return'Добрый вечер';
}

function updateStreak(){
  const today=todayStr();
  if(lastStreakDate===today)return;
  const todayPills=pills.filter(p=>pillActiveOnDate(p,today));
  if(!todayPills.length)return;
  let total=0,done=0;
  todayPills.forEach(p=>p.times.forEach((_,ti)=>{total++;if(taken[takenKey(today,p.id,ti)])done++;}));
  if(done===total&&total>0){
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yStr=dateStr(yesterday);
    if(lastStreakDate===yStr){streak++;}else{streak=1;}
    lastStreakDate=today;
    localStorage.setItem('streak_v3',streak);
    localStorage.setItem('streakDate_v3',today);
  }
}

function dateStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}

function showToast(pillName,timeLabel,allDone){
  const title=allDone?PRAISE_ALL[Math.floor(Math.random()*PRAISE_ALL.length)]:PRAISE_ONE[Math.floor(Math.random()*PRAISE_ONE.length)];
  const sub=pillName+(timeLabel?' · '+timeLabel:'');
  document.getElementById('toast-icon').textContent=allDone?'🎉':'✅';
  document.getElementById('toast-title').textContent=title;
  document.getElementById('toast-sub').textContent=sub;
  const streakEl=document.getElementById('toast-streak');
  if(streak>1){streakEl.textContent='🔥'+streak;streakEl.style.display='block';}
  else streakEl.style.display='none';
  const t=document.getElementById('toast');
  t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

function render(){
  document.getElementById('greeting').textContent=getGreeting();
  const today=todayStr();
  const todayPills=pills.filter(p=>pillActiveOnDate(p,today));
  let total=0,done=0;
  todayPills.forEach(p=>p.times.forEach((_,ti)=>{total++;if(taken[takenKey(today,p.id,ti)])done++;}));
  const pct=total?Math.round(done/total*100):0;
  const circ=207.3;
  document.getElementById('ring-fill').style.strokeDashoffset=circ-(circ*pct/100);
  document.getElementById('ring-num').textContent=total?done+'/'+total:'—';
  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('ring-desc').textContent=total?'выполнено на сегодня':'нет таблеток сегодня';
  const sp=document.getElementById('streak-pill');
  if(streak>0){sp.style.display='inline-flex';document.getElementById('streak-num').textContent=streak;}
  else sp.style.display='none';

  const list=document.getElementById('pills-list');
  const sorted=todayPills.slice().sort((a,b)=>(a.times[0]||'').localeCompare(b.times[0]||''));
  if(!sorted.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">💊</div><div class="empty-txt">Нет таблеток на сегодня</div><div class="empty-sub">Нажмите + чтобы добавить</div></div>';
  } else {
    list.innerHTML=sorted.map(p=>{
      const idx=pills.indexOf(p);
      const pal=PALETTE[idx%PALETTE.length];
      const dl=daysLeft(p);
      let badge='';
      if(dl===null)badge=`<span class="dl-badge dl-none">Бессрочно</span>`;
      else if(dl<0)badge=`<span class="dl-badge dl-end">Курс окончен</span>`;
      else if(dl===0)badge=`<span class="dl-badge dl-warn">Последний день</span>`;
      else if(dl<=5)badge=`<span class="dl-badge dl-warn">Осталось ${dl} дн.</span>`;
      else badge=`<span class="dl-badge dl-ok">Осталось ${dl} дн.</span>`;
      const freqLbl=FREQ_LABELS[p.times.length]||(p.times.length+' раза в день');
      const doseRows=p.times.map((t,ti)=>{
        const k=takenKey(today,p.id,ti);
        const isDone=!!taken[k];
        return`<div class="dose-row${isDone?' done':''}">
          <div class="dose-time">${t}</div>
          <div class="dose-lbl">${p.dose}</div>
          <button class="check-btn${isDone?' checked':''}" onclick="toggleTaken('${p.id}',${ti})" aria-label="${isDone?'Отменить':'Принять'}">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>`;
      }).join('');
      return`<div class="pill-group">
        <div class="pill-stripe" style="background:${pal.stripe}"></div>
        <div class="pill-body">
          <div class="pill-head" onclick="editPill('${p.id}')">
            <div class="pill-emoji-wrap" style="background:${pal.bg}">${p.emoji}</div>
            <div class="pill-meta">
              <div class="pill-name">${p.name}</div>
              <div class="pill-freq">${freqLbl}</div>
            </div>
            ${badge}
          </div>
          ${doseRows}
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('st-total').textContent=pills.length;
  document.getElementById('st-taken').textContent=done;
  renderCourses();renderHistory();renderCalendar();
}

function toggleTaken(pid,ti){
  const today=todayStr();
  const k=takenKey(today,pid,ti);
  const was=!!taken[k];
  taken[k]=!was;
  if(!taken[k])delete taken[k];
  const p=pills.find(x=>x.id===pid);
  if(p){
    if(!was){
      const todayPills=pills.filter(q=>pillActiveOnDate(q,today));
      let total=0,done=0;
      todayPills.forEach(q=>q.times.forEach((_,i)=>{total++;if(taken[takenKey(today,q.id,i)])done++;}));
      updateStreak();
      showToast(p.name,p.times[ti]||'',done===total&&total>0);
    }
    history.unshift({date:new Date().toLocaleDateString('ru-RU'),name:p.name+(p.times.length>1?' ('+p.times[ti]+')':''),done:!was});
    if(history.length>80)history=history.slice(0,80);
  }
  localStorage.setItem('taken_v3',JSON.stringify(taken));
  localStorage.setItem('hist_v3',JSON.stringify(history));
  render();
}

function renderCourses(){
  const el=document.getElementById('courses-list');
  if(!pills.length){el.innerHTML='<div style="font-size:14px;color:var(--text2);padding:4px 0">Нет таблеток</div>';return}
  el.innerHTML=pills.map((p,i)=>{
    const pal=PALETTE[i%PALETTE.length];
    const dl=daysLeft(p);
    let dText='',pct=0,col='var(--text2)';
    if(dl===null){dText='Бессрочно';}
    else if(dl<0){dText='Завершён';col='var(--red)';pct=100;}
    else if(dl===0){dText='Последний день';col='var(--amber)';pct=99;}
    else{
      dText=`Осталось ${dl} дн.`;col=dl<=5?'var(--amber)':'var(--green)';
      if(p.startDate&&p.endDate){
        const s=parseDateLocal(p.startDate),e=parseDateLocal(p.endDate),now=new Date();
        pct=Math.min(100,Math.round(Math.max(0,(now-s)/864e5)/Math.max(1,(e-s)/864e5)*100));
      }
    }
    let datesText='';
    if(p.startDate)datesText+=parseDateLocal(p.startDate).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    if(p.endDate)datesText+=' — '+parseDateLocal(p.endDate).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    const sub=(FREQ_LABELS[p.times.length]||(p.times.length+' раза в день'))+(datesText?' · '+datesText:'');
    return`<div class="course-item">
      <div class="c-dot" style="background:${pal.stripe}"></div>
      <div class="c-info">
        <div class="c-name">${p.name}</div>
        <div class="c-sub">${sub}</div>
        ${(p.startDate&&p.endDate)?`<div class="c-prog-wrap"><div class="c-prog-fill" style="width:${pct}%;background:${pal.stripe}"></div></div>`:''}
      </div>
      <div class="c-days" style="color:${col}">${dText}</div>
    </div>`;
  }).join('');
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!history.length){el.innerHTML='<div style="font-size:14px;color:var(--text2);padding:4px 0">История пуста</div>';return}
  el.innerHTML=history.slice(0,20).map(h=>`<div class="hist-item">
    <div><div class="hist-name">${h.name}</div><div class="hist-date">${h.date}</div></div>
    <span class="hb ${h.done?'hb-done':'hb-skip'}">${h.done?'Принято':'Отменено'}</span>
  </div>`).join('');
}

function renderCalendar(){
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('cal-month-label').textContent=months[calMonth]+' '+calYear;
  const today=todayStr();
  const firstDay=new Date(calYear,calMonth,1);
  const startDow=dowIndex(firstDay);
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  let html='<div class="cal-dh">Пн</div><div class="cal-dh">Вт</div><div class="cal-dh">Ср</div><div class="cal-dh">Чт</div><div class="cal-dh">Пт</div><div class="cal-dh">Сб</div><div class="cal-dh">Вс</div>';
  const makeDay=(dn,ds,cls)=>{
    const hp=pills.some(p=>pillActiveOnDate(p,ds));
    return`<div class="cal-day ${cls}${hp?' has-pills':''}" onclick="selectCalDay('${ds}')">${dn}</div>`;
  };
  for(let i=0;i<startDow;i++){const dn=prevDays-startDow+1+i;const m=calMonth===0?12:calMonth,y=calMonth===0?calYear-1:calYear;html+=makeDay(dn,y+'-'+pad(m)+'-'+pad(dn),'other');}
  for(let d=1;d<=dim;d++){const ds=calYear+'-'+pad(calMonth+1)+'-'+pad(d);html+=makeDay(d,ds,ds===selCalDay?'sel':ds===today?'today':'');}
  const total=startDow+dim,rem=(7-total%7)%7;
  for(let i=1;i<=rem;i++){const m=calMonth===11?1:calMonth+2,y=calMonth===11?calYear+1:calYear;html+=makeDay(i,y+'-'+pad(m)+'-'+pad(i),'other');}
  document.getElementById('cal-grid').innerHTML=html;
  renderCalDetail();
}

function selectCalDay(ds){selCalDay=ds;renderCalendar()}
function changeMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++}else if(calMonth<0){calMonth=11;calYear--}renderCalendar()}

function renderCalDetail(){
  const el=document.getElementById('cal-detail');
  if(!selCalDay){el.innerHTML='';return}
  const d=parseDateLocal(selCalDay);
  const label=d.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  const today=todayStr();
  const dayPills=pills.filter(p=>pillActiveOnDate(p,selCalDay));
  if(!dayPills.length){el.innerHTML=`<div class="detail-card"><div class="detail-title">${label}</div><div style="font-size:13px;color:var(--text2)">Нет таблеток в этот день</div></div>`;return}
  const items=dayPills.flatMap((p,i)=>{
    const pal=PALETTE[pills.indexOf(p)%PALETTE.length];
    return p.times.map((t,ti)=>{
      const k=takenKey(selCalDay,p.id,ti);
      const isDone=!!taken[k];
      const isFuture=selCalDay>today;
      let dotColor=isFuture?'var(--text3)':isDone?'var(--green)':'var(--red)';
      return`<div class="detail-item">
        <div class="det-emoji">${p.emoji}</div>
        <div class="det-name">${p.name}</div>
        <div class="det-time">${t}</div>
        <div class="det-dot" style="background:${dotColor}"></div>
      </div>`;
    });
  }).join('');
  el.innerHTML=`<div class="detail-card"><div class="detail-title">${label}</div>${items}</div>`;
}

function showScreen(s){
  ['home','cal','stats'].forEach(x=>{
    document.getElementById(x+'-screen').style.display=s===x?'block':'none';
    document.getElementById('nav-'+x).classList.toggle('active',s===x);
  });
  if(s==='cal'){selCalDay=todayStr();renderCalendar()}
}

/* ── Modal ── */
function buildTimesUI(times){
  document.getElementById('times-list').innerHTML=times.map((t,i)=>`
    <div class="time-row">
      <div class="time-lbl">${i+1}-й приём</div>
      <input class="finput time-inp" type="time" value="${t}" style="flex:1"/>
      ${times.length>1?`<button class="rm-btn" onclick="removeTimeRow(this)">×</button>`:'<div style="width:32px"></div>'}
    </div>`).join('');
}
function applyPreset(btn){
  document.querySelectorAll('.fpreset').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  const n=+btn.dataset.n;
  buildTimesUI(n===0?['08:00']:DEFAULT_TIMES[n]||['08:00']);
  document.getElementById('add-time-btn').style.display=n===0?'block':'none';
}
function addTimeRow(){
  const inputs=[...document.querySelectorAll('.time-inp')];
  const times=inputs.map(i=>i.value);times.push(times[times.length-1]||'08:00');
  document.querySelectorAll('.fpreset').forEach(b=>b.classList.toggle('sel',b.dataset.n==='0'));
  buildTimesUI(times);
}
function removeTimeRow(btn){
  const rows=[...document.querySelectorAll('.time-row')];
  if(rows.length<=1)return;
  const times=[...document.querySelectorAll('.time-inp')].map(i=>i.value);
  times.splice(rows.indexOf(btn.closest('.time-row')),1);
  buildTimesUI(times);
}
function openAdd(){
  editId=null;
  document.getElementById('modal-title').textContent='Добавить таблетку';
  document.getElementById('f-name').value='';
  document.getElementById('f-dose').value='';
  document.getElementById('f-start').value=todayStr();
  document.getElementById('f-end').value='';
  selE='💊';
  document.querySelectorAll('.ebtn').forEach(b=>b.classList.toggle('sel',b.dataset.e==='💊'));
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.add('sel'));
  document.querySelectorAll('.fpreset').forEach(b=>b.classList.toggle('sel',b.dataset.n==='1'));
  buildTimesUI(['08:00']);
  document.getElementById('add-time-btn').style.display='none';
  document.getElementById('delete-btn').style.display='none';
  document.getElementById('modal-root').style.display='block';
}
function editPill(id){
  const p=pills.find(x=>x.id===id);if(!p)return;
  editId=id;
  document.getElementById('modal-title').textContent='Редактировать';
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-dose').value=p.dose==='Без дозировки'?'':p.dose;
  document.getElementById('f-start').value=p.startDate||'';
  document.getElementById('f-end').value=p.endDate||'';
  selE=p.emoji;
  document.querySelectorAll('.ebtn').forEach(b=>b.classList.toggle('sel',b.dataset.e===p.emoji));
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('sel',p.days.includes(+b.dataset.d)));
  const n=p.times.length;
  document.querySelectorAll('.fpreset').forEach(b=>b.classList.toggle('sel',+b.dataset.n===n||(n>4&&b.dataset.n==='0')));
  buildTimesUI(p.times);
  document.getElementById('add-time-btn').style.display=n>4?'block':'none';
  document.getElementById('delete-btn').style.display='block';
  document.getElementById('modal-root').style.display='block';
}
function deletePill(){
  if(!editId)return;
  if(!confirm('Удалить таблетку?'))return;
  pills=pills.filter(p=>p.id!==editId);
  localStorage.setItem('pills_v3',JSON.stringify(pills));
  closeModal();render();
}
function overlayClick(e){if(e.target===e.currentTarget)closeModal()}
function closeModal(){document.getElementById('modal-root').style.display='none'}
function selEmoji(btn){document.querySelectorAll('.ebtn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');selE=btn.dataset.e}
function togDay(btn){btn.classList.toggle('sel')}
function savePill(){
  const name=document.getElementById('f-name').value.trim();
  const dose=document.getElementById('f-dose').value.trim();
  const startDate=document.getElementById('f-start').value||'';
  const endDate=document.getElementById('f-end').value||'';
  const days=[...document.querySelectorAll('.dbtn.sel')].map(b=>+b.dataset.d);
  const times=[...document.querySelectorAll('.time-inp')].map(i=>i.value).filter(Boolean).sort();
  if(!name){document.getElementById('f-name').focus();return}
  if(!days.length){alert('Выберите хотя бы один день');return}
  if(!times.length){alert('Добавьте хотя бы одно время');return}
  if(editId){
    const p=pills.find(x=>x.id===editId);
    if(p)Object.assign(p,{name,dose:dose||'Без дозировки',times,emoji:selE,days,startDate,endDate});
  } else {
    pills.push({id:Date.now().toString(),name,dose:dose||'Без дозировки',times,emoji:selE,days,startDate,endDate});
  }
  localStorage.setItem('pills_v3',JSON.stringify(pills));
  closeModal();render();
}

render();
setInterval(render,60000);
</script>
</body>
</html>
